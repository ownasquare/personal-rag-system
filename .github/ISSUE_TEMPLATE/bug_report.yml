name: Bug report
description: Report a reproducible problem without sharing private content or credentials.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: >-
        Do not include API keys, .env contents, private documents, questions, answers, database
        files, or unredacted logs. Report security issues privately through SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: List the smallest sequence that reproduces the problem with synthetic data.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 0.2.0 or a commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Sanitized environment
      description: OS, architecture, Python, uv, Docker, and Compose versions.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Safe diagnostics
      description: Service health states and safe error codes only; redact paths and secrets.
  - type: checkboxes
    id: checks
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials and private document or conversation content.
          required: true
        - label: This is not a security vulnerability.
          required: true
