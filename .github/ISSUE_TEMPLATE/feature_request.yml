name: Feature request
description: Propose a focused improvement to the single-user personal library.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem is difficult today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the smallest workflow that would solve it.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Setup and operations
        - Documents and parsing
        - Search and answers
        - Interface
        - API and integrations
        - Contributor experience
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Security, privacy, or compatibility considerations
      description: Note provider data flow, migration, reindex, or deployment implications.
