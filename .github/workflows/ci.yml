name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.17"
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --all-groups --frozen
      - run: uv run python scripts/check_public_repo.py
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src
      - run: uv run bandit -q -r src scripts
      - run: uv run pytest -q -m "not live" --disable-socket --allow-unix-socket --cov=personal_rag --cov-report=term-missing --cov-report=xml
      - run: uv run pip-audit

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RAG_API_KEY: ci-application-token-32-characters-minimum
      RAG_QDRANT_API_KEY: ci-qdrant-token-different-32-characters
      RAG_OPENAI_API_KEY: ci-openai-key-not-valid-no-network
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Validate and build the Compose topology
        run: |
          docker compose config --quiet
          docker compose build
      - name: Start the no-provider-call smoke stack
        run: docker compose up -d
      - name: Wait for API, worker, vector inventory, and UI readiness
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8000/health/ready > /tmp/personal-rag-ready.json; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              docker compose ps
              docker compose logs --no-color --tail=100
              exit 1
            fi
            sleep 2
          done
          curl --fail --silent http://127.0.0.1:8501/_stcore/health
          docker compose exec -T ui python -c "from pathlib import Path; assert Path('/app/.streamlit/config.toml').is_file()"
      - name: Stop smoke stack
        if: always()
        run: docker compose down --volumes --remove-orphans
