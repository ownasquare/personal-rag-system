name: personal-rag

x-app-environment: &app-environment
  RAG_ENVIRONMENT: production
  RAG_AUTH_ENABLED: "true"
  RAG_API_KEY: ${RAG_API_KEY:?Set RAG_API_KEY in a non-committed .env file}
  RAG_DATA_DIR: /data
  RAG_QDRANT_MODE: http
  RAG_QDRANT_HOST: qdrant
  RAG_QDRANT_PORT: "6333"
  RAG_QDRANT_HTTPS: "false"
  RAG_QDRANT_API_KEY: ${RAG_QDRANT_API_KEY:?Set RAG_QDRANT_API_KEY in a non-committed .env file}
  RAG_QDRANT_COLLECTION: ${RAG_QDRANT_COLLECTION:-personal_knowledge}
  RAG_EMBEDDING_PROVIDER: ${RAG_EMBEDDING_PROVIDER:-openai}
  RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-text-embedding-3-large}
  RAG_EMBEDDING_DIMENSIONS: ${RAG_EMBEDDING_DIMENSIONS:-3072}
  RAG_OPENAI_API_KEY: ${RAG_OPENAI_API_KEY:-}
  RAG_VOYAGE_API_KEY: ${RAG_VOYAGE_API_KEY:-}
  RAG_CHAT_PROVIDER: openai
  RAG_CHAT_MODEL: ${RAG_CHAT_MODEL:-gpt-4.1-mini}
  RAG_CHAT_TEMPERATURE: ${RAG_CHAT_TEMPERATURE:-0.1}
  RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-768}
  RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-96}
  RAG_PARSER_VERSION: ${RAG_PARSER_VERSION:-1}
  RAG_UPLOAD_MAX_BYTES: ${RAG_UPLOAD_MAX_BYTES:-26214400}
  RAG_UPLOAD_READ_BYTES: ${RAG_UPLOAD_READ_BYTES:-1048576}
  RAG_MAX_PDF_PAGES: ${RAG_MAX_PDF_PAGES:-500}
  RAG_MAX_EXTRACTED_CHARACTERS: ${RAG_MAX_EXTRACTED_CHARACTERS:-2000000}
  RAG_RETRIEVAL_TOP_K: ${RAG_RETRIEVAL_TOP_K:-5}
  RAG_RETRIEVAL_MAX_TOP_K: ${RAG_RETRIEVAL_MAX_TOP_K:-10}
  RAG_RETRIEVAL_MIN_SCORE: ${RAG_RETRIEVAL_MIN_SCORE:-0.1}
  RAG_MAX_QUERY_CHARACTERS: ${RAG_MAX_QUERY_CHARACTERS:-4000}
  RAG_MAX_HISTORY_MESSAGES: ${RAG_MAX_HISTORY_MESSAGES:-12}
  RAG_CITATION_SNIPPET_CHARACTERS: ${RAG_CITATION_SNIPPET_CHARACTERS:-420}
  RAG_JOB_MAX_ATTEMPTS: ${RAG_JOB_MAX_ATTEMPTS:-3}
  RAG_JOB_LEASE_SECONDS: ${RAG_JOB_LEASE_SECONDS:-300}
  RAG_WORKER_POLL_SECONDS: ${RAG_WORKER_POLL_SECONDS:-1.0}
  RAG_WORKER_STALE_SECONDS: ${RAG_WORKER_STALE_SECONDS:-90}
  RAG_PROVIDER_TIMEOUT_SECONDS: ${RAG_PROVIDER_TIMEOUT_SECONDS:-60.0}
  RAG_PROVIDER_MAX_RETRIES: ${RAG_PROVIDER_MAX_RETRIES:-3}
  RAG_LOG_LEVEL: ${RAG_LOG_LEVEL:-INFO}
  RAG_CORS_ORIGINS: '["http://127.0.0.1:8501","http://localhost:8501"]'
  RAG_JSON_LOGS: "true"
  RAG_METRICS_ENABLED: ${RAG_METRICS_ENABLED:-true}

x-app-security: &app-security
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:size=256m,mode=1777

services:
  qdrant:
    image: qdrant/qdrant:v1.18.3-unprivileged
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${RAG_QDRANT_API_KEY:?Set RAG_QDRANT_API_KEY in a non-committed .env file}
      QDRANT__TELEMETRY_DISABLED: "true"
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:${RAG_QDRANT_HOST_PORT:-6333}:6333"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  api:
    build:
      context: .
    image: personal-rag-system:local
    restart: unless-stopped
    environment:
      <<: *app-environment
      RAG_HOST: 0.0.0.0
      RAG_API_PORT: "8000"
    volumes:
      - app_data:/data
    ports:
      - "127.0.0.1:${RAG_API_PORT:-8000}:8000"
    depends_on:
      qdrant:
        condition: service_started
    <<: *app-security

  worker:
    image: personal-rag-system:local
    restart: unless-stopped
    command: ["python", "-m", "personal_rag.worker"]
    environment:
      <<: *app-environment
    volumes:
      - app_data:/data
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      disable: true
    <<: *app-security

  ui:
    image: personal-rag-system:local
    restart: unless-stopped
    command:
      - streamlit
      - run
      - src/personal_rag/ui/app.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --server.headless=true
    environment:
      RAG_API_URL: http://api:8000
      RAG_API_KEY: ${RAG_API_KEY:?Set RAG_API_KEY in a non-committed .env file}
      RAG_UI_PORT: "8501"
      RAG_UPLOAD_MAX_BYTES: ${RAG_UPLOAD_MAX_BYTES:-26214400}
      RAG_RETRIEVAL_TOP_K: ${RAG_RETRIEVAL_TOP_K:-5}
      RAG_RETRIEVAL_MAX_TOP_K: ${RAG_RETRIEVAL_MAX_TOP_K:-10}
      RAG_MAX_QUERY_CHARACTERS: ${RAG_MAX_QUERY_CHARACTERS:-4000}
      RAG_MAX_HISTORY_MESSAGES: ${RAG_MAX_HISTORY_MESSAGES:-12}
      RAG_UI_POLL_SECONDS: ${RAG_UI_POLL_SECONDS:-1.0}
      RAG_UI_POLL_TIMEOUT_SECONDS: ${RAG_UI_POLL_TIMEOUT_SECONDS:-180.0}
      HOME: /tmp
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    ports:
      - "127.0.0.1:${RAG_UI_PORT:-8501}:8501"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=3).read()
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    <<: *app-security

volumes:
  app_data:
  qdrant_data:
